<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗺 커리어 파이프라인</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280; --line: #e5e7eb;
    --side-bg: #f8f9fa; --accent: #2563eb; --accent-bg: #eff6ff;
    --code-bg: #f3f4f6; --quote: #7c3aed;
    --job: #2563eb; --job-bg: #eff6ff; --startup: #059669; --startup-bg: #ecfdf5;
    --shared: #9333ea; --shared-bg: #faf5ff; --card-bg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d; --fg: #e5e7eb; --muted: #9ca3af; --line: #2d3139;
      --side-bg: #1c1f26; --accent: #60a5fa; --accent-bg: #1e293b;
      --code-bg: #23272f; --quote: #a78bfa;
      --job: #60a5fa; --job-bg: #1e2a3f; --startup: #34d399; --startup-bg: #14312a;
      --shared: #c084fc; --shared-bg: #2b2140; --card-bg: #1c1f26;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
         background: var(--bg); color: var(--fg); display: flex; height: 100vh; overflow: hidden; }

  /* ---- 사이드바 ---- */
  #side { width: 300px; min-width: 230px; background: var(--side-bg); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; }
  #side header { padding: 12px 14px 8px; }
  #side h1 { font-size: 15px; margin: 0 0 8px; cursor: pointer; }
  #side h1:hover { color: var(--accent); }
  #search { width: 100%; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px;
            background: var(--bg); color: var(--fg); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #tree { flex: 1; overflow-y: auto; padding: 4px 8px 20px; }
  .stage { margin-top: 14px; }
  .stage > .stitle { font-size: 11px; font-weight: 800; letter-spacing: .06em; padding: 3px 8px;
                     color: var(--muted); border-bottom: 1px solid var(--line); margin-bottom: 3px; }
  .group { margin-top: 6px; }
  .group > .gtitle { font-size: 11.5px; font-weight: 700; padding: 3px 8px; cursor: default; user-select: none; }
  .lane-취업 .gtitle { color: var(--job); }
  .lane-창업 .gtitle { color: var(--startup); }
  .lane-공용 .gtitle { color: var(--shared); }
  .file { display: block; padding: 5px 8px 5px 16px; border-radius: 7px; cursor: pointer;
          font-size: 13px; line-height: 1.35; color: var(--fg); text-decoration: none;
          overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file:hover { background: var(--accent-bg); }
  .file.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  .file .mt { display: block; font-size: 10.5px; color: var(--muted); font-weight: 400; }
  .file.unread { font-weight: 600; }
  .badge { display: inline-block; font-size: 9.5px; font-weight: 800; border-radius: 5px;
           padding: 1px 5px; margin-right: 6px; vertical-align: 1px; }
  .badge-new { background: #16a34a; color: #fff; }
  .badge-upd { background: #d97706; color: #fff; }
  .unread-box { border: 1px solid var(--accent); border-radius: 10px; padding: 4px 4px 8px; margin: 10px 2px 4px;
                background: var(--accent-bg); }
  .unread-box > .gtitle { color: var(--accent); display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .mark-all { border: 1px solid var(--accent); background: transparent; color: var(--accent);
              border-radius: 6px; font-size: 10px; padding: 2px 7px; cursor: pointer; }
  .mark-all:hover { background: var(--accent); color: #fff; }

  /* ---- 본문 ---- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar { display: flex; align-items: center; gap: 10px; padding: 10px 22px;
            border-bottom: 1px solid var(--line); font-size: 13px; color: var(--muted); }
  #topbar .path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #topbar button { border: 1px solid var(--line); background: var(--bg); color: var(--fg);
                   border-radius: 7px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  #topbar button:hover { border-color: var(--accent); color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 26px 36px 80px; }
  #doc { max-width: 880px; margin: 0 auto; line-height: 1.75; font-size: 15.5px; }

  /* ---- 마크다운 ---- */
  #doc h1 { font-size: 26px; border-bottom: 2px solid var(--line); padding-bottom: 8px; }
  #doc h2 { font-size: 21px; margin-top: 2em; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  #doc h3 { font-size: 17px; margin-top: 1.6em; }
  #doc a { color: var(--accent); }
  #doc blockquote { margin: 1em 0; padding: 8px 16px; border-left: 4px solid var(--quote);
                    background: var(--code-bg); border-radius: 0 8px 8px 0; }
  #doc blockquote p { margin: 6px 0; }
  #doc code { background: var(--code-bg); padding: 2px 6px; border-radius: 5px; font-size: 13.5px; }
  #doc pre { background: var(--code-bg); padding: 14px 16px; border-radius: 10px; overflow-x: auto; }
  #doc pre code { background: none; padding: 0; }
  #doc table { border-collapse: collapse; margin: 1em 0; width: 100%; display: block; overflow-x: auto; font-size: 14px; }
  #doc th, #doc td { border: 1px solid var(--line); padding: 7px 11px; text-align: left; vertical-align: top; }
  #doc th { background: var(--code-bg); }
  #doc hr { border: none; border-top: 1px solid var(--line); margin: 2.2em 0; }
  #doc li { margin: 4px 0; }
  #doc .txt-plain { white-space: pre-wrap; font-size: 14px; line-height: 1.7; }

  /* ---- 온톨로지 홈 ---- */
  #home { max-width: 1100px; margin: 0 auto; }
  #home h2.htitle { font-size: 20px; margin: 4px 0 2px; border: none; }
  #home .hsub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .flow { display: grid; grid-template-columns: 1fr 34px 1fr 34px 1fr; gap: 14px 0; align-items: stretch; }
  .colhead { font-size: 11px; font-weight: 800; letter-spacing: .08em; color: var(--muted); text-align: center; padding-bottom: 4px; }
  .arrow { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }
  .colstack { display: flex; flex-direction: column; gap: 14px; }
  .node { border: 1.5px solid var(--line); border-radius: 14px; background: var(--card-bg); padding: 12px 14px;
          display: flex; flex-direction: column; min-height: 120px; }
  .node .ntitle { font-size: 13.5px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .node .ndesc { font-size: 11.5px; color: var(--muted); margin: 3px 0 8px; }
  .node .count { font-size: 10.5px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .node .count .u { color: #16a34a; font-weight: 800; }
  .node .nfiles { display: flex; flex-direction: column; gap: 1px; }
  .node .nfiles .file { padding: 3px 6px; font-size: 12.5px; }
  .node.lane-취업 { border-color: var(--job); background: var(--job-bg); }
  .node.lane-창업 { border-color: var(--startup); background: var(--startup-bg); }
  .node.lane-공용 { border-color: var(--shared); background: var(--shared-bg); }
  .lane-label { font-size: 10px; font-weight: 800; border-radius: 5px; padding: 1px 6px; color: #fff; }
  .lane-취업 .lane-label { background: var(--job); }
  .lane-창업 .lane-label { background: var(--startup); }
  .lane-공용 .lane-label { background: var(--shared); }
</style>
</head>
<body>
<nav id="side">
  <header>
    <h1 onclick="goHome()">🗺 커리어 파이프라인</h1>
    <input id="search" type="search" placeholder="파일명 검색…">
  </header>
  <div id="tree"></div>
</nav>
<div id="main">
  <div id="topbar">
    <button onclick="goHome()">🏠 홈</button>
    <span class="path" id="curpath"></span>
    <span id="curtime"></span>
    <button onclick="loadTree()">새로고침</button>
  </div>
  <div id="content"><div id="doc"></div></div>
</div>

<script>
/* ===== 온톨로지 정의: input ─▶ function ─▶ output, 취업/창업 레인 ===== */
const NODES = [
  { id:'jay',    col:'input',    lane:'공용', title:'input/Jay — 지식 베이스',
    desc:'INDEX → 지식카드(K1~K7) → 주제별 발췌 → 전사록',
    match: p => p.startsWith('input/Jay/') },
  { id:'inputs', col:'input',    lane:'공용', title:'input — 경력·프로젝트 원자료',
    desc:'경력, 포트폴리오, 면접 전사록, 질문',
    match: p => (p.startsWith('input/') && !p.startsWith('input/Jay/')) || !p.includes('/') },
  { id:'fnjob',  col:'function', lane:'취업', title:'function/job — 지원 전략',
    desc:'JD 분석 · 포지셔닝 · 이력서/자소서 작성 맥락',
    match: p => p.startsWith('function/job/') },
  { id:'fnst',   col:'function', lane:'창업', title:'function/startup — 피칭 전략',
    desc:'Plug and Play · 트랙션 서사 · 프로젝트 선정',
    match: p => p.startsWith('function/startup/') },
  { id:'outjob', col:'output',   lane:'취업', title:'output/job — 지원 산출물',
    desc:'Cognition · Upstage 이력서/자소서/답안',
    match: p => p.startsWith('output/job/') },
  { id:'outst',  col:'output',   lane:'창업', title:'output/startup — 피칭 산출물',
    desc:'피치덱 · 원페이저 · KSC 지원서',
    match: p => p.startsWith('output/startup/') },
  { id:'outsh',  col:'output',   lane:'공용', title:'output — 포트폴리오 허브',
    desc:'portfolio-bithabit 사이트',
    match: p => p.startsWith('output/') && !p.startsWith('output/job/') && !p.startsWith('output/startup/') },
];
const nodeOf = p => NODES.find(n => n.match(p));

let allFiles = [], current = null, currentMtime = 0;

/* 읽음 기록: { 경로: 마지막으로 본 mtime } */
let seen = {};
try { seen = JSON.parse(localStorage.getItem('mdviewer-seen') || '{}'); } catch (e) {}
function saveSeen() { localStorage.setItem('mdviewer-seen', JSON.stringify(seen)); }
function unreadState(f) {
  if (!(f.path in seen)) return 'new';
  if (f.mtime > seen[f.path] + 1) return 'upd';
  return null;
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtTime(t) {
  const d = new Date(t * 1000), now = new Date();
  const hm = pad(d.getHours()) + ':' + pad(d.getMinutes());
  if (d.toDateString() === now.toDateString()) return '오늘 ' + hm;
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hm;
}

function fileLink(f, showPath) {
  const st = unreadState(f);
  const badge = st === 'new' ? '<span class="badge badge-new">NEW</span>'
              : st === 'upd' ? '<span class="badge badge-upd">수정됨</span>' : '';
  const a = document.createElement('a');
  a.className = 'file' + (current === f.path ? ' active' : '') + (st ? ' unread' : '');
  a.title = f.path;
  const dir = f.path.split('/').slice(0, -1).join('/');
  a.innerHTML = `${badge}${f.name.replace(/\.(md|txt)$/i, '')}` +
    `<span class="mt">${showPath && dir ? dir + ' · ' : ''}${fmtTime(f.mtime)}</span>`;
  a.onclick = () => openFile(f.path);
  return a;
}

/* ===== 사이드바: 파이프라인 순서로 그룹 ===== */
const STAGES = [
  { name: '📥 INPUT — 원자료·지식', ids: ['jay', 'inputs'] },
  { name: '⚙️ FUNCTION — 변환 전략', ids: ['fnjob', 'fnst'] },
  { name: '📤 OUTPUT — 산출물', ids: ['outjob', 'outst', 'outsh'] },
];

function renderTree(filter) {
  const tree = document.getElementById('tree');
  let files = allFiles;
  if (filter) files = files.filter(f => f.path.toLowerCase().includes(filter.toLowerCase()));
  tree.innerHTML = '';

  /* 안 본 문서 모아보기 */
  const unread = files.filter(f => unreadState(f)).sort((a, b) => b.mtime - a.mtime);
  if (unread.length) {
    const div = document.createElement('div');
    div.className = 'group unread-box';
    div.innerHTML = `<div class="gtitle">🆕 안 본 문서 (${unread.length})` +
      `<button class="mark-all">모두 읽음</button></div>`;
    div.querySelector('.mark-all').onclick = (e) => {
      e.stopPropagation();
      for (const f of allFiles) seen[f.path] = f.mtime;
      saveSeen(); renderTree(filter); if (!current) goHome();
    };
    for (const f of unread.slice(0, 15)) div.appendChild(fileLink(f, true));
    tree.appendChild(div);
  }

  for (const stage of STAGES) {
    const sdiv = document.createElement('div');
    sdiv.className = 'stage';
    sdiv.innerHTML = `<div class="stitle">${stage.name}</div>`;
    let any = false;
    for (const id of stage.ids) {
      const node = NODES.find(n => n.id === id);
      const group = files.filter(f => nodeOf(f.path) === node).sort((a, b) => b.mtime - a.mtime);
      if (!group.length) continue;
      any = true;
      const gdiv = document.createElement('div');
      gdiv.className = 'group lane-' + node.lane;
      gdiv.innerHTML = `<div class="gtitle">${node.lane !== '공용' ? node.lane + ' · ' : ''}${node.title.split(' — ')[0]}</div>`;
      for (const f of group) gdiv.appendChild(fileLink(f, false));
      sdiv.appendChild(gdiv);
    }
    if (any) tree.appendChild(sdiv);
  }
}

/* ===== 온톨로지 홈 ===== */
function nodeCard(node) {
  const files = allFiles.filter(f => nodeOf(f.path) === node).sort((a, b) => b.mtime - a.mtime);
  const un = files.filter(f => unreadState(f)).length;
  const div = document.createElement('div');
  div.className = 'node lane-' + node.lane;
  div.innerHTML =
    `<div class="ntitle"><span>${node.lane !== '공용' ? `<span class="lane-label">${node.lane}</span> ` : ''}${node.title}</span>` +
    `<span class="count">${files.length}개${un ? ` · <span class="u">NEW ${un}</span>` : ''}</span></div>` +
    `<div class="ndesc">${node.desc}</div>`;
  const list = document.createElement('div');
  list.className = 'nfiles';
  for (const f of files.slice(0, 4)) list.appendChild(fileLink(f, false));
  div.appendChild(list);
  return div;
}

function goHome() {
  current = null; location.hash = '';
  document.getElementById('curpath').textContent = '온톨로지 홈 — input ▶ function ▶ output';
  document.getElementById('curtime').textContent = '';
  const doc = document.getElementById('doc');
  doc.innerHTML = '';
  const home = document.createElement('div');
  home.id = 'home';
  home.innerHTML = `<h2 class="htitle">🗺 나의 지식 → 전략 → 결과</h2>` +
    `<div class="hsub">하나의 원자료(경력·프로젝트·Jay 멘토링)가 두 파이프라인(<b style="color:var(--job)">취업</b> / <b style="color:var(--startup)">창업</b>)을 거쳐 산출물이 된다. 카드의 파일을 바로 클릭해 열 수 있다.</div>`;
  const flow = document.createElement('div');
  flow.className = 'flow';
  flow.innerHTML = `<div class="colhead">📥 INPUT</div><div></div><div class="colhead">⚙️ FUNCTION</div><div></div><div class="colhead">📤 OUTPUT</div>`;
  const cols = { input: document.createElement('div'), function: document.createElement('div'), output: document.createElement('div') };
  for (const c of Object.values(cols)) c.className = 'colstack';
  for (const n of NODES) cols[n.col].appendChild(nodeCard(n));
  flow.appendChild(cols.input);
  flow.insertAdjacentHTML('beforeend', '<div class="arrow">▶</div>');
  flow.appendChild(cols.function);
  flow.insertAdjacentHTML('beforeend', '<div class="arrow">▶</div>');
  flow.appendChild(cols.output);
  home.appendChild(flow);
  doc.appendChild(home);
  renderTree(document.getElementById('search').value.trim());
}

/* ===== 파일 열기 ===== */
async function openFile(path, keepScroll) {
  const res = await fetch('/api/file?path=' + encodeURIComponent(path));
  if (!res.ok) return;
  const data = await res.json();
  current = path; currentMtime = data.mtime;
  seen[path] = data.mtime; saveSeen();
  location.hash = encodeURIComponent(path);
  document.getElementById('curpath').textContent = path;
  document.getElementById('curtime').textContent = '수정: ' + fmtTime(data.mtime);
  const doc = document.getElementById('doc');
  const scroll = keepScroll ? document.getElementById('content').scrollTop : 0;
  if (path.toLowerCase().endsWith('.md') && window.marked) {
    doc.innerHTML = marked.parse(data.content, { gfm: true, breaks: true });
  } else {
    doc.innerHTML = '';
    const pre = document.createElement('div');
    pre.className = 'txt-plain';
    pre.textContent = data.content;
    doc.appendChild(pre);
  }
  document.getElementById('content').scrollTop = scroll;
  renderTree(document.getElementById('search').value.trim());
}

async function loadTree() {
  const res = await fetch('/api/tree');
  allFiles = await res.json();
  if (current) renderTree(document.getElementById('search').value.trim());
  else goHome();
}

/* 열린 파일 변경 감지 (3초) */
setInterval(async () => {
  if (!current) return;
  try {
    const res = await fetch('/api/file?path=' + encodeURIComponent(current));
    const data = await res.json();
    if (data.mtime && data.mtime !== currentMtime) openFile(current, true);
  } catch (e) {}
}, 3000);
/* 새 파일 감지 (10초) — 홈/사이드바에 NEW 자동 반영 */
setInterval(loadTree, 10000);

document.getElementById('search').addEventListener('input', e => renderTree(e.target.value.trim()));

loadTree().then(() => {
  const h = decodeURIComponent(location.hash.slice(1));
  if (h) openFile(h);
});
</script>
</body>
</html>
